<?xml version="1.0" encoding="UTF-8"?>
<!--
  Git workflow diagram (ASCII comment block only - avoids encoding issues).
  See visible text inside SVG for French labels (encoded as XML entities).
-->
<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="720" viewBox="0 0 1000 720">
  <defs>
    <style type="text/css"><![CDATA[
      .title { font: 600 17px system-ui, "Segoe UI", sans-serif; fill: #0f172a; }
      .subtitle { font: 13px system-ui, sans-serif; fill: #475569; }
      .mono { font: 12px ui-monospace, "Consolas", monospace; fill: #1e293b; }
      .small { font: 11px system-ui, sans-serif; fill: #64748b; }
      .rule { font: 11px system-ui, sans-serif; fill: #334155; }
      .line-main { stroke: #1d4ed8; stroke-width: 2.8; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .line-dev { stroke: #047857; stroke-width: 2.5; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .line-feat { stroke: #c2410c; stroke-width: 2.2; fill: none; stroke-dasharray: 7 5; stroke-linecap: round; }
      .line-hot { stroke: #7c2d12; stroke-width: 2.2; fill: none; stroke-linecap: round; }
      .dot { stroke: #fff; stroke-width: 2; }
      .dot-main { fill: #2563eb; }
      .dot-dev { fill: #059669; }
      .dot-feat { fill: #ea580c; }
      .dot-merge { fill: #7c3aed; }
      .dot-hot { fill: #b45309; }
      .tag { font: 11px ui-monospace, monospace; fill: #0f172a; }
      .panel { fill: #f8fafc; stroke: #e2e8f0; stroke-width: 1; rx: 8; }
    ]]></style>
  </defs>

  <rect width="100%" height="100%" fill="#ffffff"/>

  <text x="32" y="34" class="title">Arbre Git : lecture et dessin</text>
  <text x="32" y="54" class="subtitle">Graphe orient&#233; (parents &#8594; enfants). Les &#233;tiquettes main / develop d&#233;signent des pointeurs sur des commits.</text>

  <rect x="24" y="68" width="952" height="118" class="panel"/>
  <text x="40" y="92" class="mono">Comment dessiner un arbre complet et correct</text>
  <text x="40" y="112" class="rule">1. Lister les commits dans l&#8217;ordre chronologique (git log --oneline --graph --all).</text>
  <text x="40" y="128" class="rule">2. Pour chaque commit, tracer une ar&#234;te vers son parent (1 parent) ou vers ses deux parents (merge).</text>
  <text x="40" y="144" class="rule">3. Placer les &#233;tiquettes de branche (main, develop, feature/x) uniquement sur la pointe correspondante.</text>
  <text x="40" y="160" class="rule">4. V&#233;rifier : en remontant les fl&#232;ches depuis main, on doit rejoindre la racine sans ligne &#171; flottante &#187; sans commit.</text>
  <text x="40" y="176" class="rule">5. Outil pratique : reproduire d&#8217;abord en ASCII (git log --graph) puis vectoriser.</text>

  <rect x="24" y="200" width="952" height="200" class="panel"/>
  <text x="40" y="228" class="mono">A) Exemple : flux r&#233;el simplifi&#233; (doc, puis develop, puis merge dans main)</text>
  <text x="40" y="246" class="small">main re&#231;oit un merge no-ff ; develop continue avec des commits apr&#232;s le merge (sch&#233;ma indicatif).</text>

  <path class="line-main" d="M 130 310 L 520 310 L 620 310 L 760 310"/>
  <path class="line-dev" d="M 130 310 L 130 380 L 260 380 L 390 380 L 480 380"/>
  <path class="line-dev" d="M 480 380 L 560 380"/>
  <line class="line-main" x1="480" y1="380" x2="520" y2="310"/>
  <line class="line-main" x1="130" y1="310" x2="130" y2="380" stroke-dasharray="4 3" opacity="0.35"/>

  <circle cx="130" cy="310" r="9" class="dot dot-main"/>
  <text x="118" y="292" class="small">A</text>
  <text x="96" y="325" class="tag">chore: doc</text>

  <circle cx="130" cy="380" r="8" class="dot dot-dev"/>
  <text x="118" y="404" class="small">B</text>
  <text x="88" y="388" class="tag">proto</text>

  <circle cx="260" cy="380" r="8" class="dot dot-dev"/>
  <text x="248" y="404" class="small">C</text>
  <text x="220" y="388" class="tag">serveur</text>

  <circle cx="390" cy="380" r="8" class="dot dot-dev"/>
  <text x="378" y="404" class="small">D</text>
  <text x="330" y="388" class="tag">client+tests</text>

  <circle cx="480" cy="380" r="8" class="dot dot-dev"/>
  <text x="452" y="404" class="small">D2</text>
  <text x="420" y="388" class="tag">docs TLS</text>

  <circle cx="520" cy="310" r="10" class="dot dot-merge"/>
  <text x="505" y="292" class="small">M</text>
  <text x="488" y="328" class="tag">merge develop</text>

  <circle cx="620" cy="310" r="8" class="dot dot-main"/>
  <text x="590" y="292" class="small">...</text>

  <circle cx="760" cy="310" r="9" class="dot dot-main"/>
  <text x="748" y="292" class="small">H</text>
  <text x="720" y="328" class="tag">main</text>

  <text x="560" y="372" class="tag">develop</text>

  <rect x="24" y="418" width="952" height="286" class="panel"/>
  <text x="40" y="446" class="mono">B) Arbre &#171; complet &#187; type GitFlow (feature + hotfix sur main)</text>
  <text x="40" y="464" class="small">Une feature part de develop et y revient ; un hotfix part de main et est rappatri&#233; sur develop.</text>

  <path class="line-main" d="M 90 520 L 190 520 L 320 520 L 450 520 L 580 520 L 720 520 L 860 520"/>
  <path class="line-dev" d="M 90 520 L 90 600 L 220 600 L 350 600 L 480 600 L 610 600 L 750 600"/>
  <path class="line-feat" d="M 220 600 L 220 670 L 300 670 L 380 670"/>
  <line class="line-feat" x1="380" y1="670" x2="350" y2="600"/>
  <path class="line-hot" d="M 450 520 L 450 470 L 530 470"/>
  <line class="line-hot" x1="530" y1="470" x2="580" y2="520"/>
  <line x1="580" y1="520" x2="610" y2="600" stroke="#047857" stroke-width="2" stroke-dasharray="5 4" fill="none" opacity="0.9"/>

  <circle cx="90" cy="520" r="8" class="dot dot-main"/>
  <text x="78" y="502" class="small">v0</text>

  <circle cx="190" cy="520" r="8" class="dot dot-main"/>
  <text x="160" y="502" class="small">rel</text>

  <circle cx="320" cy="520" r="8" class="dot dot-merge"/>
  <text x="300" y="502" class="small">M1</text>
  <text x="268" y="536" class="tag">merge release</text>

  <circle cx="450" cy="520" r="8" class="dot dot-main"/>
  <text x="430" y="502" class="small">prod</text>

  <circle cx="530" cy="470" r="8" class="dot dot-hot"/>
  <text x="512" y="454" class="small">h1</text>
  <text x="488" y="488" class="tag">hotfix</text>

  <circle cx="580" cy="520" r="9" class="dot dot-merge"/>
  <text x="562" y="502" class="small">M2</text>
  <text x="520" y="536" class="tag">merge hotfix vers main</text>

  <circle cx="720" cy="520" r="8" class="dot dot-main"/>
  <circle cx="860" cy="520" r="8" class="dot dot-main"/>
  <text x="832" y="502" class="tag">main</text>

  <circle cx="90" cy="600" r="8" class="dot dot-dev"/>
  <circle cx="220" cy="600" r="8" class="dot dot-dev"/>
  <circle cx="350" cy="600" r="8" class="dot dot-dev"/>
  <circle cx="220" cy="670" r="7" class="dot dot-feat"/>
  <circle cx="300" cy="670" r="7" class="dot dot-feat"/>
  <text x="200" y="692" class="tag">feature/x</text>
  <circle cx="480" cy="600" r="8" class="dot dot-dev"/>
  <circle cx="610" cy="600" r="9" class="dot dot-merge"/>
  <text x="588" y="618" class="tag">merge hotfix vers dev</text>
  <circle cx="750" cy="600" r="8" class="dot dot-dev"/>
  <text x="722" y="618" class="tag">develop</text>

  <text x="32" y="708" class="small">Astuce : sous Git, &#171; arbre &#187; = graphe de commits ; les branches sont des r&#233;f&#233;rences mobiles sur ce graphe.</text>
</svg>
